spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret-key: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:864000000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://coffeeshop.com,https://www.coffeeshop.com}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

sepay:
  bank-name: ${SEPAY_BANK_NAME}
  account-number: ${SEPAY_ACCOUNT_NUMBER}
  account-name: ${SEPAY_ACCOUNT_NAME}
  api-key: ${SEPAY_API_KEY}
  transfer-prefix: ${SEPAY_TRANSFER_PREFIX:DH}

ghn:
  token: ${GHN_TOKEN}
  shop-id: ${GHN_SHOP_ID}
  base-url: ${GHN_BASE_URL:https://dev-online-gateway.ghn.vn}
  from-name: ${GHN_FROM_NAME:Coffee shop}
  from-phone: "${GHN_FROM_PHONE:0837001977}"
  from-address: "${GHN_FROM_ADDRESS:So 34, Ngo 197 Tran Phu, Phuong Van Quan, Quan Ha Dong, Ha Noi}"
  from-district-id: ${GHN_FROM_DISTRICT_ID:1542}
  from-ward-code: "${GHN_FROM_WARD_CODE:1B1515}"
  default-height: ${GHN_DEFAULT_HEIGHT:10}
  default-weight: ${GHN_DEFAULT_WEIGHT:500}
  default-length: ${GHN_DEFAULT_LENGTH:20}
  default-width: ${GHN_DEFAULT_WIDTH:15}
